<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Dashboard - Sri Bharathi Vidyalaya</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="aset/logo.png">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #eef1f5;
      font-family: system-ui;
      color: #1f2937;
    }

    header {
      background: #0b3c5d;
      color: white;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 600;
    }

    .container {
      max-width: 980px;
      margin: 22px auto;
      background: white;
      padding: 26px;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,.15);
    }

    .profil-box {
      display: flex;
      gap: 26px;
      align-items: flex-start;
    }

    .profil-box img {
      max-width: 140px;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      background: #fafafa;
      padding: 6px;
    }

    #nama { margin: 0 0 6px 0; font-size: 22px; font-weight: 700; }
    #jabatan { font-size: 14px; font-weight: 600; color: #1e6fa3; margin-bottom: 14px; }

    table { width: 100%; border-collapse: separate; border-spacing: 0 6px; font-size: 14px; }

    td { padding: 6px 6px; line-height: 1.6; vertical-align: top; }

    td:first-child { width: 34%; font-weight: 600; color: #374151; padding-right: 12px; }
    td:last-child { color: #111827; }

    #status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #1e3a8a;
      font-weight: 600;
      font-size: 12px;
    }

    .tools-title { margin-top: 34px; margin-bottom: 8px; font-weight: 700; font-size: 18px; }

    .tools-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
    }

    .tool-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,.1);
      cursor: pointer;
      transition: .25s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .tool-card:hover { transform: translateY(-5px); box-shadow: 0 12px 26px rgba(11,60,93,.25); }

    .tool-card-img {
      height: 110px;
      background: linear-gradient(135deg, #1e6fa3, #0b3c5d);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tool-card-img img { width: 70%; height: 70%; object-fit: contain; }

    .tool-card-content { padding: 12px; display: flex; flex-direction: column; gap: 6px; }

    .tool-card-title { font-size: 13px; font-weight: 700; color: #0b3c5d; }
    .tool-card-desc { font-size: 11px; color: #6b7280; }

    .logout {
      margin-top: 22px;
      padding: 9px 16px;
      border-radius: 12px;
      border: none;
      background: #c62828;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>Teacher Dashboard — Sri Bharathi Vidyalaya</header>

<div class="container">
  <div class="profil-box">
    <img id="foto">
    <div>
      <h2 id="nama"></h2>
      <div id="jabatan"></div>
      <table>
        <tr><td>Employee ID</td><td id="nip"></td></tr>
        <tr><td>Teacher ID</td><td id="nuptk"></td></tr>
        <tr><td>Date of Birth</td><td id="tempat_tanggal_lahir"></td></tr>
        <tr><td>Appointment Order</td><td id="sk"></td></tr>
        <tr><td>Tax Number</td><td id="nomor_npwp"></td></tr>
        <tr><td>Joining Date</td><td id="tmt"></td></tr>
        <tr><td>Grade</td><td id="golongan"></td></tr>
        <tr><td>Qualification</td><td id="pendidikan"></td></tr>
        <tr><td>Role</td><td id="menjabat"></td></tr>
        <tr><td>Status</td><td id="status"></td></tr>
        <tr><td>Phone</td><td id="hp"></td></tr>
        <tr><td>Address</td><td id="alamat"></td></tr>
      </table>
    </div>
  </div>

  <div class="tools-title">📚 Educational Resources</div>
  <div class="tools-grid" id="toolsArea"></div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<script src="gtk.js"></script>
<script>
const user = JSON.parse(localStorage.getItem("loginUser") || "{}");
if (!user.username) location.href = "login.html";

const d = DATA_GTK[user.username];
if (!d) {
  localStorage.removeItem("loginUser");
  location.href = "login.html";
}

document.getElementById("foto").src = d.foto || "aset/default-teacher.jpg";
document.getElementById("nama").textContent = d.nama || "-";
document.getElementById("jabatan").textContent = d.jabatan || "-";

document.getElementById("nip").textContent = d.nip || "-";
document.getElementById("nuptk").textContent = d.nuptk || "-";
document.getElementById("tempat_tanggal_lahir").textContent = d.tempat_tanggal_lahir || "-";
document.getElementById("sk").textContent = d.sk_pengangkatan || "-";
document.getElementById("nomor_npwp").textContent = d.nomor_npwp || "-";
document.getElementById("tmt").textContent = d.tmt || "-";
document.getElementById("golongan").textContent = d.golongan || "-";
document.getElementById("pendidikan").textContent = d.pendidikan || "-";
document.getElementById("menjabat").textContent = d.menjabat || "-";
document.getElementById("status").textContent = d.status_kepegawaian || "-";
document.getElementById("hp").textContent = d.no_hp || "-";
document.getElementById("alamat").textContent = d.alamat || "-";

const TOOLS = [
  { judul: "Question Bank", deskripsi: "Practice questions and exam materials", link: "https://tryout.id/coba-gratis" },
  { judul: "Exam Simulation", deskripsi: "Practice online exams", link: "https://pusmendik.kemdikbud.go.id" },
  { judul: "Teaching Resources", deskripsi: "Lesson plans and materials", link: "https://www.gurumaju.com" },
  { judul: "Teacher Community", deskripsi: "Share teaching resources", link: "https://guruberbagi-demo.simpkb.id/" }
];

const toolsArea = document.getElementById("toolsArea");
TOOLS.forEach(t => {
  const box = document.createElement("div");
  box.className = "tool-card";
  box.innerHTML = `
    <div class="tool-card-img">📖</div>
    <div class="tool-card-content">
      <div class="tool-card-title">${t.judul}</div>
      <div class="tool-card-desc">${t.deskripsi}</div>
    </div>`;
  box.onclick = () => window.open(t.link, "_blank");
  toolsArea.appendChild(box);
});

function logout() {
  localStorage.removeItem("loginUser");
  location.href = "login.html";
}
</script>
</body>
</html>
