<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Sri Bharathi Vidyalaya - Get in Touch</title>
  <link rel="icon" type="image/png" href="aset/logo.png">
  <link rel="stylesheet" href="string.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    body {
      background: #f4f6f9;
      padding-top: 70px
    }


    .header-inner {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .header-text {
      display: flex;
      flex-direction: column;
      gap: 2px
    }


    .school-name {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.5px
    }

    .school-subtitle {
      font-size: 11px;
      opacity: 0.9
    }

    .section-title {
      font-size: 2.5rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 15px;
      color: #0b3c5d;
      position: relative;
      padding-bottom: 20px
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 4px;
      background: linear-gradient(90deg, #f7b733, #fc4a1a);
      border-radius: 2px
    }

    /* WRAPPER */
.contact-wrapper{
  max-width:1200px;
  margin:60px auto;
  padding:0 20px;
}

/* CONTAINER */
.contact-container{
  display:flex;
  gap:40px;
  flex-wrap:wrap;
}

/* LEFT FORM */
.contact-form{
  flex:1;
  background:#fff;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.contact-form h3{
  margin-bottom:20px;
}

.contact-form form{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.contact-form input,
.contact-form textarea{
  padding:12px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:1rem;
  outline:none;
}

.contact-form input:focus,
.contact-form textarea:focus{
  border-color:#0b3c5d;
}

.contact-form button{
  padding:12px;
  background:#0b3c5d;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.contact-form button:hover{
  background:#1e6fa3;
}

/* RIGHT SIDE */
.contact-info{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* MAP */
.map iframe{
  width:100%;
  height:250px;
  border-radius:12px;
}

/* INFO BOX */
.info-box{
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.info-box p{
  margin-bottom:15px;
  color:#444;
  line-height:1.6;
}

/* RESPONSIVE */
@media(max-width:768px){
  .contact-container{
    flex-direction:column;
  }
}
    .footer {
      background: #0b3c5d;
      color: white;
      padding: 40px 20px;
      text-align: center;
      font-size: 14px;
      margin-top: 60px
    }

    .footer p {
      opacity: 0.8
    }
  </style>
</head>

<body>

<div id="header"></div>

 
  <div class="contact-wrapper">

  <h2 class="section-title">Contact Us</h2>

  <div class="contact-container">

    <!-- LEFT: FORM -->
    <div class="contact-form">
      <h3>Send Message</h3>

      <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="tel" placeholder="Your Phone">

        <textarea rows="5" placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>

    <!-- RIGHT: MAP + DETAILS -->
    <div class="contact-info">

      <!-- Google Map -->
      <div class="map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3920.8772963549554!2d79.4585650745159!3d10.666631261210437!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a554c2d3047a7cf%3A0x719bda7b09e99bcc!2sSri%20Barathi%20Vidyalaya%20school!5e0!3m2!1sen!2sin!4v1776077975264!5m2!1sen!2sin" 
        width="600" 
        height="450" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>

      <!-- Details -->
      <div class="info-box">
       <p>
    <i class="fas fa-location-dot"></i>
    <strong>Address: </strong><br/>
    <a href="https://maps.app.goo.gl/8ETAcgdsZTD7BrQ8A" target="_blank">
      43, West, Othai Street, Mannargudi-614001
    </a>
  </p>

  <p>
    <i class="fas fa-phone"></i>
    <strong>Mobile Number:</strong><br>
    <a href="tel:+919840927298">+91 9840927298</a> |
    <a href="tel:+918678927298">8678927298</a>
  </p>

  <p>
    <i class="fas fa-envelope"></i>
    <strong>Email:</strong><br/>
    <a href="mailto:info@sribarathividyalaya.com">
      info@sribarathividyalaya.com | admissions@sribarathividyalaya.com
    </a> 
   
  </p>
      </div>

    </div>

  </div>
</div>

<div id="footer"></div>
  <script src="script.js">
  </script>
  <script src="include.js"></script>
</body>

</html>
